name: Build OpenWrt Feed

on:
  workflow_dispatch:
    inputs:
      version:
        description: "OpenWRT version with apk support (25.x or newer, e.g., 25.12.3)"
        required: true
        type: string
      targets:
        description: "Targets (comma-separated, optional)"
        required: false
        type: string
      subtargets:
        description: "Subtargets (comma-separated, optional)"
        required: false
        type: string

permissions:
  contents: write

jobs:
  generate-config:
    runs-on: ubuntu-latest
    outputs:
      job-config: ${{ steps.generate-config.outputs.job-config }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20.16.0"

      - name: Prepare build inputs
        run: |
          set -euo pipefail
          VERSION="${{ inputs.version }}"
          MAJOR_VERSION="${VERSION%%.*}"
          if ! printf '%s\n' "$MAJOR_VERSION" | grep -Eq '^[0-9]+$'; then
            echo "Invalid OpenWrt version: $VERSION"
            exit 1
          fi
          if [ "$MAJOR_VERSION" -lt 25 ]; then
            echo "GitHub Pages package feed is supported only for OpenWrt 25.x or newer (apk/packages.adb)."
            echo "Use GitHub Releases artifacts for OpenWrt $VERSION."
            exit 1
          fi

          echo "VERSION=$VERSION" >> "$GITHUB_ENV"

          if [ -n "${{ inputs.targets }}" ]; then
            echo "TARGETS=${{ inputs.targets }}" >> "$GITHUB_ENV"
          fi

          if [ -n "${{ inputs.subtargets }}" ]; then
            echo "SUBTARGETS=${{ inputs.subtargets }}" >> "$GITHUB_ENV"
          fi

      - name: Install dependencies
        run: npm install

      # Reuse existing matrix generation logic from release workflow.
      - name: Generate job config
        id: generate-config
        run: node index.js "${{ env.VERSION }}" "${{ env.TARGETS }}" "${{ env.SUBTARGETS }}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-feed:
    name: "v${{ matrix.build_env.tag }} - ${{ matrix.build_env.pkgarch }} :: feed"
    runs-on: ubuntu-latest
    needs: generate-config
    defaults:
      run:
        shell: bash
    # Use the official OpenWrt SDK container hosted on GitHub Container Registry.
    # This avoids bootstrapping Ubuntu packages and manually downloading/extracting
    # the SDK for every matrix job.
    container:
      image: ghcr.io/openwrt/sdk:${{ matrix.build_env.target }}-${{ matrix.build_env.subtarget }}-${{ matrix.build_env.tag }}
      # The official SDK image uses a non-root user that cannot write GitHub
      # Actions command files under /__w/_temp, so checkout fails without this.
      options: --user root
    strategy:
      matrix:
        build_env: ${{ fromJson(needs.generate-config.outputs.job-config) }}
      fail-fast: false
    steps:
      - name: Checkout AWG source code
        uses: actions/checkout@v4

      - name: Setup SDK and feeds
        env:
          AWG_FEED_APK_PRIVATE_KEY: ${{ secrets.AWG_FEED_APK_PRIVATE_KEY }}
          AWG_FEED_APK_PUBLIC_KEY: ${{ secrets.AWG_FEED_APK_PUBLIC_KEY }}
        run: |
          set -euo pipefail
          SDK_DIR="${OPENWRT_SDK_DIR:-/builder}"
          if [ ! -d "$SDK_DIR" ]; then
            echo "OpenWrt SDK directory not found: $SDK_DIR"
            exit 1
          fi
          SDK_DIR=$(cd "$SDK_DIR" && pwd)
          WORKSPACE_DIR=$(pwd)
          cd "$SDK_DIR"

          # Some official SDK containers are thin wrappers and fetch the SDK
          # contents lazily via setup.sh.
          if [ ! -d scripts ]; then
            ./setup.sh
          fi

          # OpenWrt 25.x signs APK repository metadata with EC P-256 PEM keys:
          # private-key.pem/public-key.pem. The older usign key-build files are
          # for opkg feeds and cannot verify packages.adb signatures.
          if [ -z "${AWG_FEED_APK_PRIVATE_KEY:-}" ] || [ -z "${AWG_FEED_APK_PUBLIC_KEY:-}" ]; then
            echo "Missing AWG_FEED_APK_PRIVATE_KEY and/or AWG_FEED_APK_PUBLIC_KEY repository secrets."
            echo "Generate them with:"
            echo "openssl ecparam -name prime256v1 -genkey -noout -out awg-openwrt-feed.pem"
            echo "openssl ec -in awg-openwrt-feed.pem -pubout > awg-openwrt-feed.pub.pem"
            exit 1
          fi
          printf '%s\n' "$AWG_FEED_APK_PRIVATE_KEY" > private-key.pem
          printf '%s\n' "$AWG_FEED_APK_PUBLIC_KEY" > public-key.pem
          chmod 600 private-key.pem
          test -s private-key.pem
          test -s public-key.pem
          grep -q "BEGIN .*PRIVATE KEY" private-key.pem
          grep -q "BEGIN PUBLIC KEY" public-key.pem

          # Register isolated custom AWG feed as a local linked feed.
          AWG_FEED_DIR="$WORKSPACE_DIR/.tmp-awg-feed"
          rm -rf "$AWG_FEED_DIR"
          mkdir -p "$AWG_FEED_DIR"
          cp -a "$WORKSPACE_DIR/kmod-amneziawg" "$AWG_FEED_DIR/"
          cp -a "$WORKSPACE_DIR/amneziawg-tools" "$AWG_FEED_DIR/"
          cp -a "$WORKSPACE_DIR/luci-proto-amneziawg" "$AWG_FEED_DIR/"
          # Always rebuild feeds.conf from the SDK default. The official SDK
          # container can be reused by multiple steps, so appending to an
          # existing feeds.conf is not idempotent.
          if [ ! -f feeds.conf.default ]; then
            echo "feeds.conf.default is missing"
            exit 1
          fi
          cp feeds.conf.default feeds.conf
          echo "src-link awg $AWG_FEED_DIR" >> feeds.conf

          # Only base/luci are needed for LuCI dependencies; avoid updating
          # unrelated feeds such as routing/telephony/video on every matrix job.
          ./scripts/feeds update base
          ./scripts/feeds update luci
          ./scripts/feeds update awg
          # Install only AWG feed packages to avoid pulling unrelated package symbols.
          ./scripts/feeds install -p awg kmod-amneziawg
          ./scripts/feeds install -p awg amneziawg-tools
          ./scripts/feeds install -p awg luci-proto-amneziawg

          echo "CONFIG_PACKAGE_kmod-amneziawg=m" > .config
          echo "CONFIG_PACKAGE_amneziawg-tools=y" >> .config
          echo "CONFIG_PACKAGE_luci-proto-amneziawg=y" >> .config
          echo "CONFIG_PACKAGE_luci-i18n-amneziawg-ru=y" >> .config
          # Ensure feed metadata/signatures are generated in SDK output.
          echo "CONFIG_SIGNED_PACKAGES=y" >> .config

          make defconfig

      - name: Build AmneziaWG packages
        run: |
          set -euo pipefail
          SDK_DIR="${OPENWRT_SDK_DIR:-/builder}"
          if [ ! -d "$SDK_DIR" ]; then
            echo "OpenWrt SDK directory not found: $SDK_DIR"
            exit 1
          fi
          SDK_DIR=$(cd "$SDK_DIR" && pwd)
          cd "$SDK_DIR"
          CANONICAL_AWG_FEED_DIR="$SDK_DIR/bin/packages/${{ matrix.build_env.pkgarch }}/awg"
          mkdir -p "$CANONICAL_AWG_FEED_DIR"

          # Build the top-level AWG LuCI package into the isolated feed directory.
          # Its dependency graph produces amneziawg-tools and kmod-amneziawg too;
          # the checks below fail fast if any expected package is missing.
          make V=s PACKAGE_DIR="$CANONICAL_AWG_FEED_DIR" \
            package/feeds/awg/luci-proto-amneziawg/compile

          # PACKAGE_DIR is inherited by dependency builds; keep the published feed restricted to AWG packages.
          find "$CANONICAL_AWG_FEED_DIR" -maxdepth 1 -type f -name "*.apk" \
            ! -name "amneziawg-tools*.apk" \
            ! -name "kmod-amneziawg*.apk" \
            ! -name "luci-proto-amneziawg*.apk" \
            ! -name "luci-i18n-amneziawg-ru*.apk" \
            -delete

          echo "AWG feed package files:"
          find "$CANONICAL_AWG_FEED_DIR" -maxdepth 1 -type f -name "*.apk" -printf "%f\n" | sort

          # Ensure all expected AWG packages were produced before indexing/publishing.
          ls "$CANONICAL_AWG_FEED_DIR"/amneziawg-tools*.apk >/dev/null
          ls "$CANONICAL_AWG_FEED_DIR"/kmod-amneziawg*.apk >/dev/null
          ls "$CANONICAL_AWG_FEED_DIR"/luci-proto-amneziawg*.apk >/dev/null
          ls "$CANONICAL_AWG_FEED_DIR"/luci-i18n-amneziawg-ru*.apk >/dev/null

          UNEXPECTED_PACKAGES=$(find "$CANONICAL_AWG_FEED_DIR" -maxdepth 1 -type f -name "*.apk" \
            ! -name "amneziawg-tools*.apk" \
            ! -name "kmod-amneziawg*.apk" \
            ! -name "luci-proto-amneziawg*.apk" \
            ! -name "luci-i18n-amneziawg-ru*.apk" \
            -printf "%f\n")
          if [ -n "$UNEXPECTED_PACKAGES" ]; then
            echo "Unexpected package files in AWG feed:"
            echo "$UNEXPECTED_PACKAGES"
            exit 1
          fi

          # Generate repository metadata/signatures only after the AWG feed directory is clean.
          make package/index V=s PACKAGE_DIR="$CANONICAL_AWG_FEED_DIR"

          echo "AWG feed metadata:"
          find "$CANONICAL_AWG_FEED_DIR" -maxdepth 1 -type f -printf "%f\n" | sort

          echo "CANONICAL_AWG_FEED_DIR=$CANONICAL_AWG_FEED_DIR" >> "$GITHUB_ENV"

          # Validate SDK-generated APK repository metadata in canonical feed.
          test -s "$CANONICAL_AWG_FEED_DIR/packages.adb"

      - name: Prepare feed publish directory
        run: |
          set -euo pipefail

          SDK_DIR="${OPENWRT_SDK_DIR:-/builder}"
          if [ ! -d "$SDK_DIR" ]; then
            echo "OpenWrt SDK directory not found: $SDK_DIR"
            exit 1
          fi
          SDK_DIR=$(cd "$SDK_DIR" && pwd)
          VERSION="${{ matrix.build_env.tag }}"
          TARGET="${{ matrix.build_env.target }}"
          SUBTARGET="${{ matrix.build_env.subtarget }}"
          PKGARCH="${{ matrix.build_env.pkgarch }}"
          FEED_DIR="$GITHUB_WORKSPACE/feed-publish/$VERSION/$TARGET/$SUBTARGET"
          CANONICAL_AWG_FEED_DIR="${CANONICAL_AWG_FEED_DIR:?canonical feed is not resolved}"

          mkdir -p "$FEED_DIR"
          cp -a "$CANONICAL_AWG_FEED_DIR"/. "$FEED_DIR"/
          cat > "$FEED_DIR/feed.json" <<EOF
          {
            "version": "$VERSION",
            "target": "$TARGET",
            "subtarget": "$SUBTARGET",
            "pkgarch": "$PKGARCH",
            "feed": "awg"
          }
          EOF

          # Publish the public part of the stable APK repository signing key.
          mkdir -p "$GITHUB_WORKSPACE/feed-publish/keys"
          cp -a "$SDK_DIR/public-key.pem" "$GITHUB_WORKSPACE/feed-publish/keys/awg-openwrt-feed.pem"
          test -s "$GITHUB_WORKSPACE/feed-publish/keys/awg-openwrt-feed.pem"

      - name: Feed smoke tests
        run: |
          set -euo pipefail

          SDK_DIR="${OPENWRT_SDK_DIR:-/builder}"
          if [ ! -d "$SDK_DIR" ]; then
            echo "OpenWrt SDK directory not found: $SDK_DIR"
            exit 1
          fi
          SDK_DIR=$(cd "$SDK_DIR" && pwd)
          FEED_DIR="$GITHUB_WORKSPACE/feed-publish/${{ matrix.build_env.tag }}/${{ matrix.build_env.target }}/${{ matrix.build_env.subtarget }}"

          test -d "$FEED_DIR"
          test -s "$GITHUB_WORKSPACE/feed-publish/keys/awg-openwrt-feed.pem"

          # Ensure expected packages are present as package files.
          ls "$FEED_DIR"/amneziawg-tools*.apk >/dev/null
          ls "$FEED_DIR"/kmod-amneziawg*.apk >/dev/null
          ls "$FEED_DIR"/luci-proto-amneziawg*.apk >/dev/null
          ls "$FEED_DIR"/luci-i18n-amneziawg-ru*.apk >/dev/null

          # APK repository must exist and include every AWG package in adb index.
          test -s "$FEED_DIR/packages.adb"
          APK_BIN="$SDK_DIR/staging_dir/host/bin/apk"
          if [ ! -x "$APK_BIN" ]; then
            echo "OpenWrt host apk tool not found: $APK_BIN"
            exit 1
          fi
          ADB_DUMP_FILE="$RUNNER_TEMP/packages.adb.dump"
          "$APK_BIN" adbdump "$FEED_DIR/packages.adb" > "$ADB_DUMP_FILE"
          grep -q "amneziawg-tools" "$ADB_DUMP_FILE"
          grep -q "kmod-amneziawg" "$ADB_DUMP_FILE"
          grep -q "luci-proto-amneziawg" "$ADB_DUMP_FILE"
          grep -q "luci-i18n-amneziawg-ru" "$ADB_DUMP_FILE"
          ! grep -q "busybox" "$ADB_DUMP_FILE"
          ! grep -q "\blibc\b" "$ADB_DUMP_FILE"
          ! grep -q "\bubus\b" "$ADB_DUMP_FILE"

      - name: Upload feed artifact
        uses: actions/upload-artifact@v4
        with:
          name: feed-${{ matrix.build_env.tag }}-${{ matrix.build_env.target }}-${{ matrix.build_env.subtarget }}-${{ matrix.build_env.pkgarch }}
          path: feed-publish/
          if-no-files-found: error

  deploy:
    name: Deploy feed to gh-pages
    runs-on: ubuntu-latest
    needs: build-feed
    if: ${{ always() }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Restore existing GitHub Pages content
        run: |
          set -euo pipefail

          mkdir -p gh-pages-content
          if git ls-remote --exit-code --heads origin gh-pages >/dev/null 2>&1; then
            git fetch --depth=1 origin gh-pages
            git --work-tree=gh-pages-content checkout FETCH_HEAD -- .
          fi

      - name: Download all feed artifacts
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          path: gh-pages-content
          pattern: feed-*
          merge-multiple: true

      - name: Check publishable feed content
        run: |
          set -euo pipefail

          if [ -z "$(find gh-pages-content -name packages.adb -type f -print -quit)" ]; then
            echo "No successful feed artifacts and no existing gh-pages feed content found."
            exit 1
          fi

      - name: Generate GitHub Pages site
        run: |
          set -euo pipefail

          bash .github/scripts/generate-feed-pages.sh \
            "$GITHUB_WORKSPACE/gh-pages-content" \
            "https://slava-shchipunov.github.io/awg-openwrt"

      - name: Publish to GitHub Pages branch
        # Existing gh-pages content is restored above, then republished as one complete tree.
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: gh-pages-content
          enable_jekyll: true
